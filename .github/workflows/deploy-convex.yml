name: Deploy Convex

on:
  push:
    branches:
      - main
    paths:
      - "convex/**"
      - "scripts/enforce-production-convex.sh"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-convex.yml"
  workflow_dispatch:

concurrency:
  group: deploy-convex-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy self-hosted Convex
    runs-on: ubuntu-latest
    env:
      VITE_CONVEX_URL: https://convex.serving.cloud
      VITE_CONVEX_SITE_URL: https://convex-site.serving.cloud
      CONVEX_SITE_URL: https://convex-site.serving.cloud
      CONVEX_SELF_HOSTED_URL: https://convex.serving.cloud
      CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Convex deploy secret
        run: |
          if [ -z "$CONVEX_SELF_HOSTED_ADMIN_KEY" ]; then
            echo "Missing GitHub secret: CONVEX_SELF_HOSTED_ADMIN_KEY" >&2
            exit 1
          fi

      - name: Deploy Convex functions
        run: bun run deploy:convex
